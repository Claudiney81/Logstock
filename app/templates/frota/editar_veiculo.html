{% extends 'base.html' %}

{% block content %}

<style>
  .page-header {
    background: linear-gradient(135deg, #002b55, #163b63);
    color: white;
    border-radius: 14px;
    padding: 22px 26px;
    margin-bottom: 24px;
    box-shadow: 0 6px 18px rgba(0, 43, 85, .18);
  }

  .page-header h4 {
    margin: 0;
    font-weight: 700;
  }

  .page-header small {
    opacity: .9;
  }

  .form-card {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    box-shadow: 0 6px 18px rgba(15, 39, 66, .08);
  }

  .form-label {
    font-weight: 600;
    color: #374151;
  }

  .section-title {
    font-size: .9rem;
    font-weight: 700;
    color: #002b55;
    text-transform: uppercase;
    border-bottom: 1px solid #e5e7eb;
    padding-bottom: 8px;
    margin-bottom: 18px;
  }

  .info-box {
    background: #f8fafc;
    border: 1px solid #dbe4ee;
    border-left: 4px solid #002b55;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: .9rem;
    color: #334155;
  }

  .btn-elegant {
    background: #002b55;
    color: white;
    border: none;
    font-weight: 600;
  }

  .btn-elegant:hover {
    background: #001f3f;
    color: white;
  }
</style>

<div class="container-fluid mt-4">

  <div class="page-header">
    <h4>
      <i class="bi bi-pencil-square me-2"></i>
      Editar Veículo
    </h4>
    <small>
      Atualize os dados cadastrais, status, quilometragem e responsável pelo veículo.
    </small>
  </div>

  <div class="card form-card">
    <div class="card-body p-4">

      <div class="info-box mb-4">
        <strong>Veículo:</strong>
        {{ veiculo.placa }} - {{ veiculo.marca }} {{ veiculo.modelo }}
      </div>

      <form method="POST">

        <div class="section-title">
          Dados do Veículo
        </div>

        <div class="row g-3">

          <div class="col-md-3">
            <label class="form-label">Placa *</label>
            <input
              type="text"
              name="placa"
              class="form-control text-uppercase"
              value="{{ veiculo.placa }}"
              required
            >
          </div>

          <div class="col-md-3">
            <label class="form-label">Marca *</label>
            <input
              type="text"
              name="marca"
              class="form-control"
              value="{{ veiculo.marca }}"
              required
            >
          </div>

          <div class="col-md-3">
            <label class="form-label">Modelo *</label>
            <input
              type="text"
              name="modelo"
              class="form-control"
              value="{{ veiculo.modelo }}"
              required
            >
          </div>

          <div class="col-md-3">
            <label class="form-label">Ano</label>
            <input
              type="number"
              name="ano"
              class="form-control"
              value="{{ veiculo.ano or '' }}"
              min="1900"
              max="2100"
            >
          </div>

          <div class="col-md-3">
            <label class="form-label">Cor</label>
            <input
              type="text"
              name="cor"
              class="form-control"
              value="{{ veiculo.cor or '' }}"
            >
          </div>

          <div class="col-md-3">
            <label class="form-label">Tipo</label>
            <select name="tipo" class="form-select">
              <option value="">Selecione</option>

              <option value="Carro" {% if veiculo.tipo == 'Carro' %}selected{% endif %}>
                Carro
              </option>

              <option value="Moto" {% if veiculo.tipo == 'Moto' %}selected{% endif %}>
                Moto
              </option>

              <option value="Utilitário" {% if veiculo.tipo == 'Utilitário' %}selected{% endif %}>
                Utilitário
              </option>

              <option value="Caminhão" {% if veiculo.tipo == 'Caminhão' %}selected{% endif %}>
                Caminhão
              </option>

              <option value="Van" {% if veiculo.tipo == 'Van' %}selected{% endif %}>
                Van
              </option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="form-label">Quilometragem Atual</label>
            <input
              type="number"
              name="quilometragem_atual"
              class="form-control"
              value="{{ veiculo.quilometragem_atual or 0 }}"
              min="0"
            >
          </div>

          <div class="col-md-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">

              <option value="ativo" {% if veiculo.status == 'ativo' %}selected{% endif %}>
                Ativo
              </option>

              <option value="em manutencao" {% if veiculo.status == 'em manutencao' %}selected{% endif %}>
                Em manutenção
              </option>

              <option value="inativo" {% if veiculo.status == 'inativo' %}selected{% endif %}>
                Inativo
              </option>

            </select>
          </div>

        </div>

        <div class="section-title mt-4">
          Responsável e Observações
        </div>

        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Responsável</label>
            <input
              type="text"
              name="responsavel"
              class="form-control"
              value="{{ veiculo.responsavel or '' }}"
              placeholder="Nome do responsável pelo veículo"
            >
          </div>

          <div class="col-md-6">
            <label class="form-label">Observação</label>
            <textarea
              name="observacao"
              rows="3"
              class="form-control"
              placeholder="Informações adicionais sobre o veículo"
            >{{ veiculo.observacao or '' }}</textarea>
          </div>

        </div>

        <hr class="my-4">

        <div class="d-flex justify-content-between gap-2 flex-wrap">

          <a
            href="{{ url_for('frota.listar_veiculos') }}"
            class="btn btn-outline-secondary"
          >
            <i class="bi bi-arrow-left me-1"></i>
            Voltar
          </a>

          <button
            type="submit"
            class="btn btn-elegant"
          >
            <i class="bi bi-check-circle me-1"></i>
            Atualizar Veículo
          </button>

        </div>

      </form>

    </div>
  </div>

</div>

{% endblock %}
