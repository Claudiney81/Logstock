{% extends 'base.html' %} 
{% block content %}

<div class="container mt-4">
  <h2 class="mb-4 text-primary">
    <i class="bi bi-pencil-square me-2"></i>
    Editar Tipo de Serviço
  </h2>

  <div class="card shadow-sm rounded p-4">
    <form method="POST">
      
      <div class="mb-3">
        <label for="nome" class="form-label fw-semibold">
          Nome do Tipo de Serviço
        </label>
        <input
          type="text"
          name="nome"
          id="nome"
          class="form-control"
          required
          value="{{ tipo.nome }}"
        />
      </div>

      <div class="mb-3">
        <label for="tipo_estoque" class="form-label fw-semibold">
          Tipo de Estoque
        </label>

        <select
          name="tipo_estoque"
          id="tipo_estoque"
          class="form-select"
          required
        >
          <option value="">Selecione o Tipo de Estoque</option>

          <option value="empresa" {% if tipo.tipo_estoque == 'empresa' %}selected{% endif %}>
            Empresa
          </option>

          <option value="cliente" {% if tipo.tipo_estoque == 'cliente' %}selected{% endif %}>
            Cliente
          </option>
        </select>
      </div>

      <div class="d-flex justify-content-between">
        <a 
          href="{{ url_for('tipo_servico.cadastrar_tipo_servico') }}" 
          class="btn btn-secondary"
        >
          <i class="bi bi-arrow-left me-1"></i>
          Voltar
        </a>

        <button type="submit" class="btn btn-primary">
          <i class="bi bi-save me-1"></i>
          Salvar Alterações
        </button>
      </div>

    </form>
  </div>
</div>

{% endblock %}
