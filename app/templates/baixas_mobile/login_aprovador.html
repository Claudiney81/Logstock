<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Aprovador LogiStock</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="theme-color" content="#002b55">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Aprovador">

    <link rel="manifest" href="{{ url_for('static', filename='manifest_aprovador.json') }}">

    <link rel="icon"
          type="image/png"
          href="{{ url_for('static', filename='img/icon-192.png') }}">

    <link rel="apple-touch-icon"
          href="{{ url_for('static', filename='img/icon-192.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        body{
            margin:0;
            background:#eef2f7;
            font-family:Arial, sans-serif;
        }

        .login-page{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:18px;
        }

        .login-card{
            width:100%;
            max-width:390px;
            background:white;
            border-radius:18px;
            padding:26px 22px;
            box-shadow:0 10px 30px rgba(0,0,0,.12);
        }

        .login-icon{
            width:70px;
            height:70px;
            margin:0 auto;
            border-radius:50%;
            background:#002b55;
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:34px;
        }

        .form-control{
            min-height:46px;
            border-radius:12px;
        }

        .btn-login{
            min-height:46px;
            border-radius:12px;
            font-weight:600;
            background:#002b55;
            color:white;
            border:none;
        }

        .btn-login:hover{
            background:#001f3f;
            color:white;
        }

        .titulo{
            color:#002b55;
            font-weight:700;
        }

        .subtitulo{
            font-size:14px;
            color:#6c757d;
        }

    </style>

</head>

<body>

<div class="login-page">

    <div class="login-card">

        <div class="text-center mb-4">

            <div class="login-icon">
                <i class="bi bi-shield-check"></i>
            </div>

            <h4 class="mt-3 mb-1 titulo">
                Aprovação Mobile
            </h4>

            <p class="subtitulo mb-0">
                Acesso do engenheiro / supervisor
            </p>

        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} py-2">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">
                    Login ou Email
                </label>

                <input
                    type="text"
                    name="login"
                    class="form-control"
                    required
                    autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Senha
                </label>

                <input
                    type="password"
                    name="senha"
                    class="form-control"
                    required>
            </div>

            <button type="submit" class="btn btn-login w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i>
                Entrar
            </button>

        </form>

    </div>

</div>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
        navigator.serviceWorker.register(
            "{{ url_for('static', filename='sw_aprovador.js') }}"
        )
        .then(function(registration) {
            console.log('Service Worker registrado:', registration.scope);
        })
        .catch(function(error) {
            console.error('Erro ao registrar Service Worker:', error);
        });
    });
}
</script>

</body>
</html>
