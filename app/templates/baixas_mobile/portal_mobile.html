{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm border-0">

        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                <i class="bi bi-phone me-2"></i>
                Portal Mobile LogiStock
            </h5>
        </div>

        <div class="card-body">

            <div class="row">

                <!-- PORTAL TÉCNICO -->
                <div class="col-md-6 mb-4">

                    <div class="card h-100 border-primary">

                        <div class="card-header bg-light">
                            👨‍🔧 Portal Técnico
                        </div>

                        <div class="card-body">

                            <label class="form-label">
                                Link de acesso
                            </label>

                            <div class="input-group">

                                <input
                                    type="text"
                                    class="form-control"
                                    id="link_tecnico"
                                    readonly
                                    value="https://logstock.onrender.com/tecnico-mobile/login"
                                >

                                <button
                                    class="btn btn-primary"
                                    type="button"
                                    onclick="copiarLink('link_tecnico')"
                                >
                                    <i class="bi bi-clipboard"></i>
                                    Copiar
                                </button>

                                <a
                                    href="https://logstock.onrender.com/tecnico-mobile/login"
                                    target="_blank"
                                    class="btn btn-success"
                                >
                                    <i class="bi bi-box-arrow-up-right"></i>
                                    Abrir
                                </a>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- PORTAL APROVADOR -->
                <div class="col-md-6 mb-4">

                    <div class="card h-100 border-success">

                        <div class="card-header bg-light">
                            ✅ Portal Aprovador
                        </div>

                        <div class="card-body">

                            <label class="form-label">
                                Link de acesso
                            </label>

                            <div class="input-group">

                                <input
                                    type="text"
                                    class="form-control"
                                    id="link_aprovador"
                                    readonly
                                    value="https://logstock.onrender.com/baixa_tecnico/aprovador/login"
                                >

                                <button
                                    class="btn btn-primary"
                                    type="button"
                                    onclick="copiarLink('link_aprovador')"
                                >
                                    <i class="bi bi-clipboard"></i>
                                    Copiar
                                </button>

                                <a
                                    href="https://logstock.onrender.com/baixa_tecnico/aprovador/login"
                                    target="_blank"
                                    class="btn btn-success"
                                >
                                    <i class="bi bi-box-arrow-up-right"></i>
                                    Abrir
                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>
function copiarLink(id) {

    const campo = document.getElementById(id);

    navigator.clipboard.writeText(campo.value);

    alert("Link copiado com sucesso!");

}
</script>

{% endblock %}
