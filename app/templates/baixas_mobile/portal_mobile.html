{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm border-0">

        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                <i class="bi bi-phone me-2"></i>
                Portal Mobile LogiStock
            </h5>
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-6 mb-4">

                    <div class="card h-100 border-primary">

                        <div class="card-header bg-light">
                            👨‍🔧 Portal Técnico
                        </div>

                        <div class="card-body">

                            <label class="form-label">
                                Link de acesso
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                readonly
                                value="https://logstock.onrender.com/tecnico-mobile/login"
                            >

                        </div>

                    </div>

                </div>

                <div class="col-md-6 mb-4">

                    <div class="card h-100 border-success">

                        <div class="card-header bg-light">
                            ✅ Portal Aprovador
                        </div>

                        <div class="card-body">

                            <label class="form-label">
                                Link de acesso
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                readonly
                                value="https://logstock.onrender.com/baixa_tecnico/aprovador/login"
                            >

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
