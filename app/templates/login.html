{% extends 'base.html' %}

{% block content %}

<div
  class="container d-flex justify-content-center align-items-center"
  style="min-height: 80vh;"
>
  <div
    class="card shadow border-0 p-4"
    style="width:100%; max-width:420px;"
  >

    <h3 class="text-center mb-4">
      Login - LogiStock
    </h3>

    <form
      method="POST"
      action="{{ url_for('auth.login') }}"
    >

      <div class="mb-3">
        <label class="form-label">
          E-mail
        </label>

        <input
          type="text"
          class="form-control"
          name="email"
          required
          autofocus
        >
      </div>

      <div class="mb-3">
        <label class="form-label">
          Senha
        </label>

        <input
          type="password"
          class="form-control"
          name="senha"
          required
        >
      </div>

      <button
        type="submit"
        class="btn btn-primary w-100"
      >
        Entrar
      </button>

      <div class="text-center mt-3">
        <a href="{{ url_for('auth.esqueci_senha') }}">
          Esqueci minha senha
        </a>
      </div>

    </form>

  </div>
</div>

{% endblock %}
