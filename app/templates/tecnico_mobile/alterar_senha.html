<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Senha</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body{
            background:#f4f6f9;
            min-height:100vh;
        }

        .topo{
            background:#002b55;
            color:white;
            padding:25px 20px;
            border-radius:0 0 20px 20px;
            box-shadow:0 4px 10px rgba(0,0,0,.1);
        }

        .topo h4{
            margin:0;
            font-weight:700;
        }

        .container-form{
            padding:25px 18px;
        }

        .card-form{
            background:white;
            border:none;
            border-radius:18px;
            padding:22px;
            box-shadow:0 6px 18px rgba(0,0,0,.08);
        }

        .btn-salvar{
            height:48px;
            border-radius:12px;
            font-weight:600;
            background:#002b55;
            border:none;
        }

        .btn-voltar{
            height:48px;
            border-radius:12px;
            font-weight:600;
        }
    </style>

</head>
<body>

<div class="topo">
    <h4>
        <i class="bi bi-shield-lock me-2"></i>
        Alterar Senha
    </h4>

    <small>
        {{ tecnico.nome }}
    </small>
</div>

<div class="container-form">

    <div class="card-form">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}

                    <div
                        class="alert alert-{{ category }} alert-dismissible fade show"
                        role="alert"
                    >
                        {{ message }}

                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="alert"
                            aria-label="Fechar"
                        ></button>
                    </div>

                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Senha Atual
                </label>

                <input
                    type="password"
                    name="senha_atual"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Nova Senha
                </label>

                <input
                    type="password"
                    name="nova_senha"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Confirmar Nova Senha
                </label>

                <input
                    type="password"
                    name="confirmar_senha"
                    class="form-control"
                    required
                >
            </div>

            <button
                type="submit"
                class="btn btn-primary w-100 btn-salvar"
            >
                <i class="bi bi-check-circle me-2"></i>
                Salvar Nova Senha
            </button>

        </form>

        <a
            href="{{ url_for('tecnico_mobile.home') }}"
            class="btn btn-outline-secondary w-100 mt-3 btn-voltar"
        >
            <i class="bi bi-arrow-left me-2"></i>
            Voltar
        </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    setTimeout(() => {
        const alerts = document.querySelectorAll(".alert");

        alerts.forEach((alert) => {
            const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
            bsAlert.close();
        });
    }, 3000);
</script>

</body>
</html>
