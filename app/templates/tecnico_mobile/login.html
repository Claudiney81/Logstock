<!-- templates/tecnico_mobile/login.html -->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Técnico Mobile</title>

    <link rel="manifest"
          href="{{ url_for('static', filename='manifest.json') }}">

    <link rel="icon"
          type="image/png"
          sizes="192x192"
          href="{{ url_for('static', filename='img/icon-192.png') }}">

    <link rel="apple-touch-icon"
          href="{{ url_for('static', filename='img/icon-192.png') }}">

    <meta name="theme-color" content="#002b55">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:12px;
        }

        .card-login{
            width:100%;
            max-width:460px;
            border:none;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,.12);
            margin-top:-20px;
        }

        .topo{
            background:#002b55;
            color:#fff;
            padding:34px 20px 28px;
            text-align:center;
        }

        .topo h3{
            margin:0;
            font-weight:700;
        }

        .topo p{
            margin-top:8px;
            opacity:.9;
            font-size:.95rem;
        }

        .card-body{
            padding:28px;
        }

        .form-label{
            font-weight:600;
        }

        .btn-login{
            background:#002b55;
            border:none;
            height:50px;
            font-weight:600;
            border-radius:10px;
        }

        .btn-login:hover{
            background:#014080;
        }

        @media (max-width: 480px){
            .card-login{
                max-width:100%;
                margin-top:0;
            }

            .card-body{
                padding:26px 22px;
            }
        }
    </style>
</head>
<body>

<div class="card card-login">

    <div class="topo">

        <img
            src="{{ url_for('static', filename='img/logo_mobile.png') }}"
            alt="Logo LogiStock"
            style="
                width:180px;
                margin-bottom:-8px;
                margin-top:-10px;
                filter: drop-shadow(0 2px 6px rgba(0,0,0,.25));
            "
        >

        <h3
            class="mb-1"
            style="
                font-size:2rem;
                font-weight:700;
                margin-top:-5px;
            "
        >
            Portal Técnico
        </h3>

        <p
            class="mb-0"
            style="
                opacity:.9;
                font-size:1rem;
                margin-top:2px;
            "
        >
            Acesso Mobile
        </p>

    </div>

    <div class="card-body">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for categoria, mensagem in messages %}
                    <div class="alert alert-{{ categoria }}">
                        {{ mensagem }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Digite seu email"
                    required
                >
            </div>

            <div class="mb-4">
                <label class="form-label">
                    Senha
                </label>

                <input
                    type="password"
                    name="senha"
                    class="form-control"
                    placeholder="Digite sua senha"
                    required
                >
            </div>

            <button
                type="submit"
                class="btn btn-primary w-100 btn-login"
            >
                Entrar
            </button>

        </form>

    </div>

</div>

</body>
</html>
