<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Login Técnico Mobile</title>

  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='img/icon-192.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/icon-192.png') }}">
  <meta name="theme-color" content="#002b55">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #eef3f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: #0f172a;
    }

    .card-login {
      width: 100%;
      max-width: 440px;
      border: 0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(15, 23, 42, .16);
    }

    .topo {
      background: #002b55;
      color: #fff;
      padding: 30px 22px 26px;
      text-align: center;
    }

    .topo img {
      width: 164px;
      max-width: 82%;
      margin-bottom: 6px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.25));
    }

    .topo h1 {
      margin: 0;
      font-size: 1.7rem;
      font-weight: 850;
      letter-spacing: 0;
    }

    .topo p {
      margin: 5px 0 0;
      opacity: .9;
      font-size: .96rem;
    }

    .card-body {
      padding: 24px;
      background: #fff;
    }

    .form-label {
      font-weight: 700;
      font-size: .9rem;
    }

    .form-control {
      min-height: 48px;
      border-radius: 12px;
      border-color: #cbd5e1;
    }

    .btn-login {
      background: #002b55;
      border: none;
      min-height: 50px;
      font-weight: 800;
      border-radius: 12px;
    }

    .btn-login:hover {
      background: #0d477f;
    }
  </style>
</head>
<body>

<div class="card card-login">
  <div class="topo">
    <img src="{{ url_for('static', filename='img/logo_mobile.png') }}" alt="Logo LogiStock">
    <h1>Portal Técnico</h1>
    <p>Acesso mobile</p>
  </div>

  <div class="card-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for categoria, mensagem in messages %}
          <div class="alert alert-{{ categoria }} alert-dismissible fade show flash-alert" role="alert">
            {{ mensagem }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Email ou matrícula</label>
        <input
          type="text"
          name="email"
          class="form-control"
          placeholder="Digite seu email ou matrícula"
          autocomplete="username"
          required
        >
      </div>

      <div class="mb-4">
        <label class="form-label">Senha</label>
        <input
          type="password"
          name="senha"
          class="form-control"
          placeholder="Digite sua senha"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-login">
        Entrar
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".flash-alert").forEach(function(alertEl) {
      window.setTimeout(function() {
        if (!document.body.contains(alertEl)) return;
        bootstrap.Alert.getOrCreateInstance(alertEl).close();
      }, 4000);
    });
  });
</script>

</body>
</html>
