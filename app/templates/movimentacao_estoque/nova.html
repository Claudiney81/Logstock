{% extends 'base.html' %}
{% block content %}

<style>
  .page-title { color:#002b55; font-weight:700; }
  .card-main { border:0; border-radius:10px; }

  .section-header {
    background:#f8fafc;
    border-bottom:1px solid #dee2e6;
    color:#002b55;
    font-weight:700;
  }

  .table-mov th,
  .table-mov td {
    text-align:center;
    vertical-align:middle;
    font-size:.88rem;
    white-space:nowrap;
  }

  .btn-icon {
    width:34px;
    height:34px;
    padding:0;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
  }

  .btn-main {
    background:#002b55;
    color:#fff;
    border:none;
  }

  .btn-main:hover {
    background:#0b3d70;
    color:#fff;
  }

  .btn-light-blue {
    background:#edf4ff;
    border:1px solid #c9dcff;
    color:#295ea8;
    font-weight:500;
  }

  .btn-light-blue:hover {
    background:#dfeeff;
    color:#174a88;
  }

  #signature-pad {
    border:1px solid #ced4da;
    border-radius:8px;
    background:#fff;
    width:500px;
    height:140px;
    cursor:crosshair;
    touch-action:none;
  }
</style>

<div class="container-fluid mt-4">

  <div class="card shadow-sm card-main mb-4">

    <div class="card-header text-white" style="background:#002b55;">
      <h5 class="mb-0 fw-semibold">
        <i class="bi bi-arrow-left-right me-2"></i>
        Movimentação de Estoque
      </h5>
    </div>

    <div class="card-body">

      <form method="POST" action="{{ url_for('movimentacao_estoque.nova_movimentacao') }}" autocomplete="off">

        <div class="card shadow-sm border-0 mb-4">
          <div class="card-header section-header">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Dados da Movimentação
          </div>

          <div class="card-body">
            <div class="row g-3">

              <div class="col-md-3">
                <label class="form-label fw-semibold">Origem</label>
                <select id="origem_tipo" name="origem_tipo" class="form-select" required>
                  <option value="">Selecione</option>
                  <option value="empresa">Empresa</option>
                  <option value="cliente">Cliente</option>
                  <option value="tecnico">Técnico</option>
                </select>
              </div>

              <div class="col-md-3">
                <label class="form-label fw-semibold">Destino</label>
                <select id="destino_tipo" name="destino_tipo" class="form-select" required>
                  <option value="">Selecione</option>
                  <option value="empresa">Empresa</option>
                  <option value="tecnico">Técnico</option>
                </select>
              </div>

              <div class="col-md-3" id="tecnico_div" style="display:none;">
                <label class="form-label fw-semibold">Técnico</label>
                <select id="tecnico_id" name="tecnico_id" class="form-select">
                  <option value="">Selecione o técnico</option>
                  {% for tecnico in tecnicos %}
                  <option value="{{ tecnico.id }}">
                    {{ tecnico.nome }}{% if tecnico.matricula %} ({{ tecnico.matricula }}){% endif %}
                  </option>
                  {% endfor %}
                </select>
              </div>

              <div class="col-md-3" id="destino_material_div" style="display:none;">
                <label class="form-label fw-semibold">Destino do Material</label>
                <select id="destino_material" name="destino_material" class="form-select">
                  <option value="geral" selected>Saldo Geral do Técnico</option>
                  <option value="cliente_os">Cliente / O.S</option>
                </select>
              </div>

              <div class="col-md-3" id="cliente_div" style="display:none;">
                <label class="form-label fw-semibold">Cliente</label>
                <select id="cliente_id" name="cliente_id" class="form-select">
                  <option value="">Selecione o cliente</option>
                  {% for empresa in empresas %}
                  <option value="{{ empresa.id }}">
                    {{ empresa.razao_social }}
                  </option>
                  {% endfor %}
                </select>
              </div>

              <div class="col-md-3" id="os_div" style="display:none;">
                <label class="form-label fw-semibold">O.S</label>
                <select id="os_id" name="ordem_servico_id" class="form-select">
                  <option value="">Selecione a O.S</option>
                </select>
              </div>

              <div class="col-md-6" id="endereco_div" style="display:none;">
                <label class="form-label fw-semibold">Endereço</label>
                <input
                  type="text"
                  id="endereco"
                  name="endereco"
                  class="form-control"
                  readonly
                  placeholder="Endereço da O.S"
                >
              </div>

              <div class="col-md-4">
                <label class="form-label fw-semibold">Tipo de Serviço</label>
                <select id="tipo_servico_id" name="tipo_servico_id" class="form-select" required>
                  <option value="">Selecione o tipo de serviço</option>
                  {% for ts in tipos_servico %}
                  <option value="{{ ts.id }}">{{ ts.nome }}</option>
                  {% endfor %}
                </select>
              </div>

              <div class="col-md-8">
                <label class="form-label fw-semibold">Observação</label>
                <input type="text" id="observacao" name="observacao" class="form-control" placeholder="Observação da movimentação, se necessário">
              </div>

            </div>
          </div>
        </div>

        <div class="card shadow-sm border-0 mb-4">
          <div class="card-header section-header">
            <i class="bi bi-box-seam me-2"></i>
            Itens da Movimentação
          </div>

          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-bordered table-sm align-middle mb-0 table-mov" id="tabela-itens" style="min-width:1050px">
                <thead class="table-light">
                  <tr>
                    <th style="width:13%">Código</th>
                    <th style="width:35%">Descrição</th>
                    <th style="width:8%">Un</th>
                    <th style="width:8%">Qtd</th>
                    <th style="width:12%">Mín. Técnico</th>
                    <th style="width:10%">Valor Un (R$)</th>
                    <th style="width:7%">Saldo</th>
                    <th style="width:7%">Ações</th>
                  </tr>
                </thead>

                <tbody>
                  <tr>
                    <td>
                      <input type="text" name="codigo[]" class="form-control form-control-sm codigo-input" placeholder="Digite ou cole">
                    </td>

                    <td>
                      <select name="descricao[]" class="form-select form-select-sm descricao-select">
                        <option value="">Selecione</option>
                      </select>
                    </td>

                    <td>
                      <input type="text" name="unidade[]" class="form-control form-control-sm unidade-input" readonly>
                    </td>

                    <td>
                      <input type="number" name="quantidade[]" min="1" class="form-control form-control-sm text-center quantidade-input">
                    </td>

                    <td>
                      <input type="number" name="quantidade_minima[]" min="0" value="0" class="form-control form-control-sm text-center minimo-input" placeholder="Opcional">
                    </td>

                    <td>
                      <input type="number" name="valor_unitario[]" step="0.01" class="form-control form-control-sm valor-input text-center" readonly>
                    </td>

                    <td class="saldo-cell text-center">
                      <span class="saldo-info"></span>
                    </td>

                    <td class="text-center">
                      <div class="d-flex justify-content-center gap-1">
                        <button type="button" class="btn btn-outline-success btn-sm btn-icon" onclick="inserirLinha()" title="Inserir nova linha">
                          <i class="bi bi-plus"></i>
                        </button>

                        <button type="button" class="btn btn-outline-danger btn-sm btn-icon excluir-btn" style="opacity:0.5; pointer-events:none" onclick="removerLinha(this, true)" title="Excluir linha" tabindex="-1">
                          <i class="bi bi-x"></i>
                        </button>
                      </div>
                    </td>
                  </tr>
                </tbody>

              </table>
            </div>
          </div>
        </div>

        <div class="card shadow-sm border-0 mb-4">
          <div class="card-header section-header">
            <i class="bi bi-pencil-square me-2"></i>
            Assinatura do Técnico
          </div>

          <div class="card-body">
            <canvas id="signature-pad" width="500" height="140"></canvas>
            <input type="hidden" name="assinatura" id="assinatura">

            <div class="mt-2">
              <button type="button" class="btn btn-light-blue btn-sm" onclick="limparAssinatura()">
                Limpar Assinatura
              </button>
            </div>
          </div>
        </div>

        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-main">
            <i class="bi bi-save me-1"></i>
            Registrar Movimentação
          </button>

          <a href="{{ url_for('movimentacao_estoque.historico') }}" class="btn btn-light-blue">
            <i class="bi bi-clock-history me-1"></i>
            Histórico
          </a>
        </div>

      </form>

    </div>
  </div>
</div>

<script>
let itensDisponiveis = [];

function limparItens() {
  document.querySelectorAll(".codigo-input").forEach((el) => el.value = "");

  document.querySelectorAll(".descricao-select").forEach((el) => {
    el.innerHTML = '<option value="">Selecione</option>';
  });

  document.querySelectorAll(".unidade-input").forEach((el) => el.value = "");
  document.querySelectorAll(".valor-input").forEach((el) => el.value = "");
  document.querySelectorAll(".quantidade-input").forEach((el) => el.value = "");
  document.querySelectorAll(".minimo-input").forEach((el) => el.value = "0");
  document.querySelectorAll(".saldo-info").forEach((el) => el.innerText = "");

  itensDisponiveis = [];
}

function itemJaSelecionado(codigo, linhaAtual) {
  let duplicado = false;
  const codigoNormalizado = String(codigo || "").trim();

  document.querySelectorAll("#tabela-itens tbody tr").forEach((linha) => {
    if (linha === linhaAtual) return;

    const select = linha.querySelector(".descricao-select");
    const inputCodigo = linha.querySelector(".codigo-input");

    const codigoSelect = String(select?.value || "").trim();
    const codigoInput = String(inputCodigo?.value || "").trim();

    if (
      codigoNormalizado &&
      (
        codigoSelect === codigoNormalizado ||
        codigoInput === codigoNormalizado
      )
    ) {
      duplicado = true;
    }
  });

  return duplicado;
}

function limparLinhaItem(tr) {
  tr.querySelector(".codigo-input").value = "";
  tr.querySelector(".descricao-select").value = "";
  tr.querySelector(".unidade-input").value = "";
  tr.querySelector(".valor-input").value = "";
  tr.querySelector(".quantidade-input").value = "";
  tr.querySelector(".minimo-input").value = "0";
  tr.querySelector(".saldo-info").innerText = "";
}

function existeItemDuplicadoNoFormulario() {
  const codigos = [];

  document.querySelectorAll("#tabela-itens tbody tr").forEach((linha) => {
    const select = linha.querySelector(".descricao-select");
    const inputCodigo = linha.querySelector(".codigo-input");

    const codigo = String(select?.value || inputCodigo?.value || "").trim();

    if (codigo) {
      codigos.push(codigo);
    }
  });

  return new Set(codigos).size !== codigos.length;
}

function ajustarDestinoAutomatico() {
  const origemTipo = document.getElementById("origem_tipo").value;
  const destinoTipo = document.getElementById("destino_tipo");

  if (origemTipo === "empresa" || origemTipo === "cliente") {
    destinoTipo.value = "tecnico";
  }

  if (origemTipo === "tecnico") {
    destinoTipo.value = "empresa";
  }
}

function atualizarCamposDinamicos() {
  ajustarDestinoAutomatico();

  const origemTipo = document.getElementById("origem_tipo").value;
  const destinoTipo = document.getElementById("destino_tipo").value;
  const destinoMaterial = document.getElementById("destino_material")?.value || "geral";

  const tecnicoDiv = document.getElementById("tecnico_div");
  const destinoMaterialDiv = document.getElementById("destino_material_div");
  const clienteDiv = document.getElementById("cliente_div");
  const osDiv = document.getElementById("os_div");
  const enderecoDiv = document.getElementById("endereco_div");

  const tecnico = document.getElementById("tecnico_id");
  const cliente = document.getElementById("cliente_id");
  const osInput = document.getElementById("os_id");
  const enderecoInput = document.getElementById("endereco");

  const mostrarTecnico =
    origemTipo === "tecnico" ||
    destinoTipo === "tecnico";

  const mostrarDestinoMaterial =
    origemTipo === "empresa" &&
    destinoTipo === "tecnico";

  const mostrarClienteOs =
    destinoTipo === "tecnico" &&
    (
      origemTipo === "cliente" ||
      (
        origemTipo === "empresa" &&
        destinoMaterial === "cliente_os"
      )
    );

  tecnicoDiv.style.display = mostrarTecnico ? "block" : "none";
  destinoMaterialDiv.style.display = mostrarDestinoMaterial ? "block" : "none";
  clienteDiv.style.display = mostrarClienteOs ? "block" : "none";
  osDiv.style.display = mostrarClienteOs ? "block" : "none";
  enderecoDiv.style.display = mostrarClienteOs ? "block" : "none";

  tecnico.required = mostrarTecnico;
  cliente.required = origemTipo === "cliente" && destinoTipo === "tecnico";
  osInput.required = origemTipo === "cliente" && destinoTipo === "tecnico";

  if (!mostrarTecnico) {
    tecnico.value = "";
  }

  if (!mostrarDestinoMaterial) {
    document.getElementById("destino_material").value = "geral";
  }

  if (!mostrarClienteOs) {
    cliente.value = "";
    osInput.innerHTML = '<option value="">Selecione a O.S</option>';
    osInput.value = "";
    enderecoInput.value = "";
  }

  configurarMinimoTecnico();
  limparItens();
  atualizarListaDeItens();
}

function configurarMinimoTecnico() {
  const origemTipo = document.getElementById("origem_tipo").value;
  const destinoTipo = document.getElementById("destino_tipo").value;

  const mostrarMinimo = origemTipo === "empresa" && destinoTipo === "tecnico";

  document.querySelectorAll(".minimo-input").forEach((input) => {
    input.disabled = !mostrarMinimo;
    input.value = mostrarMinimo ? input.value : "0";
  });
}

function atualizarListaDeItens() {
  const tipoServicoId = document.getElementById("tipo_servico_id")?.value;
  const origemTipo = document.getElementById("origem_tipo")?.value;
  const destinoTipo = document.getElementById("destino_tipo")?.value;
  const tecnicoId = document.getElementById("tecnico_id")?.value;
  const clienteId = document.getElementById("cliente_id")?.value;

  if (!tipoServicoId || !origemTipo || !destinoTipo) {
    return;
  }

  if (origemTipo === "cliente" && !clienteId) {
    return;
  }

  if (origemTipo === "tecnico" && !tecnicoId) {
    return;
  }

  let url = `/movimentacao_estoque/api/itens?tipo_servico_id=${tipoServicoId}&origem_tipo=${origemTipo}`;

  if (origemTipo === "cliente") {
    const osId = document.getElementById("os_id")?.value;

    if (!clienteId || !osId || !tecnicoId) {
      return;
    }

    url += `&cliente_id=${clienteId}&ordem_servico_id=${osId}&tecnico_id=${tecnicoId}`;
  }

  if (origemTipo === "tecnico") {
    url += `&tecnico_id=${tecnicoId}`;
  }

  fetch(url)
    .then((res) => res.json())
    .then((data) => {
      itensDisponiveis = data;

      document.querySelectorAll(".descricao-select").forEach((select) => {
        const valorAtual = select.value;
        select.innerHTML = '<option value="">Selecione</option>';

        data.forEach((item) => {
          const option = document.createElement("option");
          option.value = item.codigo;
          option.textContent = item.descricao;
          select.appendChild(option);
        });

        select.value = valorAtual;
      });
    })
    .catch(() => {
      itensDisponiveis = [];
    });
}

document.getElementById("origem_tipo")?.addEventListener("change", atualizarCamposDinamicos);
document.getElementById("destino_tipo")?.addEventListener("change", atualizarCamposDinamicos);
document.getElementById("destino_material")?.addEventListener("change", atualizarCamposDinamicos);

document.getElementById("tecnico_id")?.addEventListener("change", () => {
  limparItens();
  atualizarListaDeItens();
});

document.getElementById("cliente_id")?.addEventListener("change", function () {
  const clienteId = this.value;
  const osSelect = document.getElementById("os_id");
  const enderecoInput = document.getElementById("endereco");

  osSelect.innerHTML = '<option value="">Selecione a O.S</option>';
  enderecoInput.value = "";

  if (!clienteId) {
    limparItens();
    atualizarListaDeItens();
    return;
  }

  fetch(`/empresas/ordens-servico-json/${clienteId}`)
    .then((res) => res.json())
    .then((lista) => {
      osSelect.innerHTML = '<option value="">Selecione a O.S</option>';

      lista.forEach((os) => {
        const option = document.createElement("option");

        option.value = os.id;
        option.textContent = os.numero_os;
        option.dataset.endereco = os.endereco || "";

        osSelect.appendChild(option);
      });

      limparItens();
      atualizarListaDeItens();
    })
    .catch(() => {
      osSelect.innerHTML = '<option value="">Erro ao carregar O.S</option>';
    });
});

document.getElementById("os_id")?.addEventListener("change", function () {
  const option = this.options[this.selectedIndex];
  const endereco = option?.dataset?.endereco || "";

  document.getElementById("endereco").value = endereco;

  limparItens();
  atualizarListaDeItens();
});

document.getElementById("tipo_servico_id")?.addEventListener("change", () => {
  limparItens();
  atualizarListaDeItens();
});

document.querySelector("#tabela-itens tbody")?.addEventListener("change", function (e) {
  if (e.target.classList.contains("descricao-select")) {
    const codigo = e.target.value;
    const tr = e.target.closest("tr");
    const item = itensDisponiveis.find((i) => String(i.codigo) === String(codigo));

    if (item) {
      if (itemJaSelecionado(item.codigo, tr)) {
        alert("Este item já foi adicionado nesta movimentação.");
        limparLinhaItem(tr);
        return;
      }

      tr.querySelector(".codigo-input").value = item.codigo;
      tr.querySelector(".unidade-input").value = item.unidade || "";
      tr.querySelector(".valor-input").value = parseFloat(item.valor || 0).toFixed(2);
      tr.querySelector(".saldo-info").innerText = item.saldo ?? 0;

      const qtdInput = tr.querySelector(".quantidade-input");
      qtdInput.max = item.saldo ?? 0;
    }
  }
});

document.querySelector("#tabela-itens tbody")?.addEventListener("input", function (e) {
  if (e.target.classList.contains("quantidade-input")) {
    const tr = e.target.closest("tr");
    const saldo = parseInt(tr.querySelector(".saldo-info")?.innerText || "0");
    const qtd = parseInt(e.target.value || "0");

    if (qtd > saldo) {
      alert("Quantidade maior que o saldo disponível.");
      e.target.value = saldo;
    }
  }
});

function inserirLinha() {
  const tbody = document.querySelector("#tabela-itens tbody");
  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td>
      <input type="text"
       name="codigo[]"
       class="form-control form-control-sm codigo-input"
       placeholder="Digite ou cole">
    </td>

    <td>
      <select name="descricao[]" class="form-select form-select-sm descricao-select">
        <option value="">Selecione</option>
      </select>
    </td>

    <td>
      <input type="text" name="unidade[]" class="form-control form-control-sm unidade-input" readonly>
    </td>

    <td>
      <input type="number" name="quantidade[]" min="1" class="form-control form-control-sm text-center quantidade-input">
    </td>

    <td>
      <input type="number" name="quantidade_minima[]" min="0" value="0" class="form-control form-control-sm text-center minimo-input" placeholder="Opcional">
    </td>

    <td>
      <input type="number" name="valor_unitario[]" step="0.01" class="form-control form-control-sm valor-input text-center" readonly>
    </td>

    <td class="saldo-cell text-center">
      <span class="saldo-info"></span>
    </td>

    <td class="text-center">
      <div class="d-flex justify-content-center gap-1">
        <button type="button" class="btn btn-outline-success btn-sm btn-icon" onclick="inserirLinha()" title="Inserir nova linha">
          <i class="bi bi-plus"></i>
        </button>

        <button type="button" class="btn btn-outline-danger btn-sm btn-icon excluir-btn" onclick="removerLinha(this, false)" title="Excluir linha">
          <i class="bi bi-x"></i>
        </button>
      </div>
    </td>
  `;

  tbody.appendChild(tr);
  configurarMinimoTecnico();
  atualizarListaDeItens();
}

function removerLinha(btn, isFirstLine) {
  const tr = btn.closest("tr");
  const tbody = tr.parentElement;

  if (isFirstLine && tbody.rows.length === 1) {
    tr.querySelectorAll("input, select").forEach((input) => input.value = "");
    tr.querySelectorAll(".minimo-input").forEach((input) => input.value = "0");
    tr.querySelectorAll(".saldo-info").forEach((span) => span.innerText = "");
    return;
  }

  tr.remove();
}

document.querySelector("form")?.addEventListener("submit", function (e) {
  const origemTipo = document.getElementById("origem_tipo").value;
  const destinoTipo = document.getElementById("destino_tipo").value;
  const destinoMaterial = document.getElementById("destino_material")?.value || "geral";
  const tecnicoId = document.getElementById("tecnico_id").value;
  const clienteId = document.getElementById("cliente_id")?.value || "";
  const osId = document.getElementById("os_id")?.value || "";

  if (!origemTipo || !destinoTipo) {
    e.preventDefault();
    alert("Selecione origem e destino.");
    return false;
  }

  if (origemTipo === destinoTipo) {
    e.preventDefault();
    alert("Origem e destino não podem ser iguais.");
    return false;
  }

  if ((origemTipo === "empresa" || origemTipo === "cliente") && destinoTipo !== "tecnico") {
    e.preventDefault();
    alert("Quando a origem for Empresa ou Cliente, o destino deve ser Técnico.");
    return false;
  }

  if (origemTipo === "tecnico" && destinoTipo !== "empresa") {
    e.preventDefault();
    alert("Quando a origem for Técnico, o destino deve ser Empresa.");
    return false;
  }

  if ((origemTipo === "tecnico" || destinoTipo === "tecnico") && !tecnicoId) {
    e.preventDefault();
    alert("Selecione o técnico.");
    return false;
  }

  if (origemTipo === "cliente" && destinoTipo === "tecnico" && !clienteId) {
    e.preventDefault();
    alert("Selecione o cliente.");
    return false;
  }

  if (origemTipo === "cliente" && destinoTipo === "tecnico" && !osId) {
    e.preventDefault();
    alert("Selecione a O.S.");
    return false;
  }

  if (
    origemTipo === "empresa" &&
    destinoTipo === "tecnico" &&
    destinoMaterial === "cliente_os" &&
    !clienteId
  ) {
    e.preventDefault();
    alert("Selecione o cliente.");
    return false;
  }

  if (
    origemTipo === "empresa" &&
    destinoTipo === "tecnico" &&
    destinoMaterial === "cliente_os" &&
    !osId
  ) {
    e.preventDefault();
    alert("Selecione a O.S.");
    return false;
  }

  let temItem = false;

  document.querySelectorAll(".descricao-select").forEach((select) => {
    if (select.value) {
      temItem = true;
    }
  });

  if (!temItem) {
    e.preventDefault();
    alert("Selecione pelo menos um item para movimentar.");
    return false;
  }

  if (existeItemDuplicadoNoFormulario()) {
    e.preventDefault();
    alert("Existe item duplicado na movimentação. Remova ou altere o item repetido antes de salvar.");
    return false;
  }
});

document.querySelector("#tabela-itens tbody")?.addEventListener("keydown", function (e) {
  if (e.target.classList.contains("codigo-input") && e.key === "Enter") {
    e.preventDefault();
    preencherItemPorCodigo(e.target);
  }
});

document.querySelector("#tabela-itens tbody")?.addEventListener("blur", function (e) {
  if (e.target.classList.contains("codigo-input")) {
    preencherItemPorCodigo(e.target);
  }
}, true);

document.querySelector("#tabela-itens tbody")?.addEventListener("paste", function (e) {
  if (e.target.classList.contains("codigo-input")) {
    setTimeout(() => {
      preencherItemPorCodigo(e.target);
    }, 100);
  }
});

function preencherItemPorCodigo(inputCodigo) {
  const codigo = inputCodigo.value.trim();

  if (!codigo) return;

  const tr = inputCodigo.closest("tr");

  const item = itensDisponiveis.find((i) =>
    String(i.codigo) === String(codigo)
  );

  if (!item) return;

  if (itemJaSelecionado(item.codigo, tr)) {
    alert("Este item já foi adicionado nesta movimentação.");
    limparLinhaItem(tr);
    return;
  }

  const select = tr.querySelector(".descricao-select");

  select.value = String(item.codigo);
  select.dispatchEvent(new Event("change"));

  tr.querySelector(".unidade-input").value = item.unidade || "";
  tr.querySelector(".valor-input").value = parseFloat(item.valor || 0).toFixed(2);
  tr.querySelector(".saldo-info").innerText = item.saldo ?? 0;

  const qtdInput = tr.querySelector(".quantidade-input");
  qtdInput.max = item.saldo ?? 0;
}

atualizarCamposDinamicos();

/* ASSINATURA */
const canvas = document.getElementById("signature-pad");

if (canvas) {
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#000";
  }

  resizeCanvas();

  let drawing = false;

  canvas.addEventListener("mousedown", function () {
    drawing = true;
    ctx.beginPath();
  });

  canvas.addEventListener("mouseup", function () {
    drawing = false;
    ctx.beginPath();

    document.getElementById("assinatura").value =
      canvas.toDataURL("image/png");
  });

  canvas.addEventListener("mouseout", function () {
    drawing = false;
    ctx.beginPath();
  });

  canvas.addEventListener("mousemove", draw);

  function draw(e) {
    if (!drawing) return;

    const rect = canvas.getBoundingClientRect();

    const x =
      (e.clientX - rect.left) *
      (canvas.width / rect.width);

    const y =
      (e.clientY - rect.top) *
      (canvas.height / rect.height);

    ctx.lineTo(x, y);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x, y);
  }

  window.limparAssinatura = function () {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.beginPath();
    document.getElementById("assinatura").value = "";
  };

  document.querySelector("form").addEventListener("submit", function () {
    document.getElementById("assinatura").value =
      canvas.toDataURL("image/png");
  });
}
</script>
