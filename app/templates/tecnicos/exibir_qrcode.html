{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h4>QR Code e Link de Acesso para {{ nome }}</h4>
    <hr>

    <p>
        <strong>Link:</strong>
        <a href="{{ link }}" target="_blank">{{ link }}</a>
    </p>

    <p><strong>QR Code:</strong></p>

    <img
        src="{{ url_for('static', filename='qrcodes/' ~ qr_filename) }}"
        alt="QR Code de acesso"
        style="max-width: 250px;"
        class="img-fluid border rounded p-2"
    >

    <div class="mt-4">
        <p><strong>Senha gerada:</strong> {{ senha_gerada }}</p>
        <p><strong>Telefone:</strong> {{ telefone }}</p>
    </div>

    {% if mensagem_whatsapp %}
    <div class="mt-4">
        <label class="form-label"><strong>Mensagem para WhatsApp:</strong></label>
        <textarea class="form-control" rows="8" readonly>{{ mensagem_whatsapp }}</textarea>
    </div>
    {% endif %}

    <a href="{{ url_for('tecnicos.listar_tecnicos') }}" class="btn btn-secondary mt-3">
        Voltar
    </a>
</div>
{% endblock %}
