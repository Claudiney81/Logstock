{% extends 'base.html' %}

{% block content %}
<div class="container mt-4 text-center">

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">

      <h3 class="mb-4 text-success">
        ✅ Acesso do Técnico Gerado
      </h3>

      <p>
        <strong>Técnico:</strong> {{ nome }}
      </p>

      <p>
        <strong>Senha inicial:</strong> {{ senha_gerada }}
      </p>

      <img
        src="{{ url_for('static', filename='qrcodes/' ~ qr_filename) }}"
        width="220"
        class="img-fluid border rounded p-2 my-3"
      >

      <div class="alert alert-info mt-3">

        <strong>Link de acesso:</strong>

        <div class="mt-2">
          <input
            type="text"
            class="form-control text-center"
            value="{{ link }}"
            readonly
          >
        </div>

      </div>

      <div class="mt-4 d-flex justify-content-center gap-2 flex-wrap">

        <a
          href="{{ link }}"
          target="_blank"
          class="btn btn-primary"
        >
          🔗 Abrir Login Técnico
        </a>

        <a
          href="https://wa.me/?text={{ mensagem_whatsapp | urlencode }}"
          target="_blank"
          class="btn btn-success"
        >
          📲 Enviar via WhatsApp
        </a>

      </div>

      <a
        href="{{ url_for('tecnicos.listar_tecnicos') }}"
        class="btn btn-secondary mt-4"
      >
        ⬅ Voltar
      </a>

    </div>
  </div>
</div>
{% endblock %}
