{% extends "base.html" %}

{% block content %}

<style>
    .tools-shell {
        width: min(100%, 1500px);
        margin: 0 auto;
        padding: 0 18px;
    }
</style>

<div class="tools-shell mt-4">

    <div class="card shadow-sm border-0">

        <div class="card-header text-white d-flex justify-content-between align-items-center"
             style="background:#002b55;">

            <h5 class="mb-0 fw-semibold">
                <i class="bi bi-exclamation-triangle me-2"></i>
                Ocorrência • Ferramentas & EPIs
            </h5>

            <div class="d-flex gap-2">
                <a href="{{ url_for('ferramentas_epis.saldo_tecnico') }}"
                   class="btn btn-light btn-sm">
                    <i class="bi bi-person-lines-fill me-1"></i>
                    Saldo
                </a>

                <a href="{{ url_for('ferramentas_epis.historico') }}"
                   class="btn btn-light btn-sm">
                    <i class="bi bi-clock-history me-1"></i>
                    Histórico
                </a>
            </div>

        </div>

        <div class="card-body">

            <form method="POST" id="formOcorrencia">

                <div class="row g-3 mb-3">

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">
                            Técnico
                        </label>

                        <select name="tecnico_id"
                                id="tecnico_id"
                                class="form-select"
                                required>
                            <option value="">Selecione</option>

                            {% for tecnico in tecnicos %}
                            <option value="{{ tecnico.id }}">
                                {{ tecnico.nome }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-5">
                        <label class="form-label fw-semibold">
                            Item em posse do técnico
                        </label>

                        <select name="item_id"
                                id="item_id"
                                class="form-select"
                                required>
                            <option value="">Selecione um técnico primeiro</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-semibold">
                            Quantidade
                        </label>

                        <input type="number"
                               name="quantidade"
                               id="quantidade"
                               class="form-control"
                               min="1"
                               value="1"
                               required>

                        <small class="text-muted" id="saldo_info"></small>
                    </div>

                </div>

                <div class="row g-3 mb-3">

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">
                            Tipo de ocorrência
                        </label>

                        <select name="tipo_ocorrencia"
                                id="tipo_ocorrencia"
                                class="form-select"
                                required>
                            <option value="">Selecione</option>
                            <option value="perda">Perda</option>
                            <option value="dano">Dano</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">
                            Aplicar desconto?
                        </label>

                        <select name="aplicar_desconto"
                                id="aplicar_desconto"
                                class="form-select"
                                required>
                            <option value="nao">Não</option>
                            <option value="sim">Sim</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">
                            Valor do desconto
                        </label>

                        <input type="number"
                               name="valor_desconto"
                               id="valor_desconto"
                               class="form-control"
                               min="0"
                               step="0.01"
                               value="0"
                               disabled>
                    </div>

                </div>

                <div class="row g-3 mb-3">

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Responsável
                        </label>

                        <input type="text"
                               class="form-control bg-light"
                               value="{{ current_user.nome if current_user.nome else current_user.email }}"
                               readonly>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Fluxo
                        </label>

                        <input type="text"
                               class="form-control bg-light"
                               value="Técnico → Baixa Patrimonial"
                               readonly>
                    </div>

                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        Observação
                    </label>

                    <textarea name="observacao"
                              rows="4"
                              class="form-control"></textarea>
                </div>

                <div class="card border-0 shadow-sm mb-4"
                     id="card_assinatura"
                     style="display:none;">

                    <div class="card-header bg-light">
                        <strong>Assinatura do Técnico para Desconto</strong>
                    </div>

                    <div class="card-body">

                        <canvas id="assinaturaCanvas"
                                style="border:1px solid #ced4da; border-radius:10px; width:100%; max-width:700px; height:180px; background:white;">
                        </canvas>

                        <input type="hidden"
                               name="assinatura"
                               id="assinaturaInput">

                        <div class="mt-3">
                            <button type="button"
                                    class="btn btn-outline-secondary btn-sm"
                                    onclick="limparAssinatura()">
                                <i class="bi bi-eraser"></i>
                                Limpar Assinatura
                            </button>
                        </div>

                    </div>

                </div>

                <div class="alert alert-warning border-0 shadow-sm mb-4"
                     id="alerta_desconto"
                     style="display:none;">
                    <strong>Atenção:</strong>
                    será gerado registro de desconto com valor informado e assinatura do técnico.
                </div>

                <div class="d-flex justify-content-end gap-2">

                    <a href="{{ url_for('ferramentas_epis.devolucao') }}"
                       class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left-right me-1"></i>
                        Devolução
                    </a>

                    <button type="submit"
                            class="btn btn-danger px-4">
                        <i class="bi bi-check-circle me-1"></i>
                        Registrar Ocorrência
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script>
const tecnicoSelect = document.getElementById("tecnico_id");
const itemSelect = document.getElementById("item_id");
const quantidadeInput = document.getElementById("quantidade");
const saldoInfo = document.getElementById("saldo_info");

tecnicoSelect.addEventListener("change", async function () {
    const tecnicoId = this.value;

    itemSelect.innerHTML = '<option value="">Carregando...</option>';
    saldoInfo.innerText = "";

    if (!tecnicoId) {
        itemSelect.innerHTML = '<option value="">Selecione um técnico primeiro</option>';
        return;
    }

    try {
        const response = await fetch(`/ferramentas-epis/api/itens-tecnico/${tecnicoId}`);
        const itens = await response.json();

        if (!itens.length) {
            itemSelect.innerHTML = '<option value="">Nenhum item em posse deste técnico</option>';
            return;
        }

        itemSelect.innerHTML = '<option value="">Selecione</option>';

        itens.forEach(item => {
            const option = document.createElement("option");

            option.value = item.item_id;
            option.dataset.saldo = item.quantidade;

            option.textContent = `${item.codigo} - ${item.descricao} (${item.categoria}) | Saldo: ${item.quantidade}`;

            itemSelect.appendChild(option);
        });

    } catch (error) {
        itemSelect.innerHTML = '<option value="">Erro ao carregar itens</option>';
    }
});

itemSelect.addEventListener("change", function () {
    const option = this.options[this.selectedIndex];
    const saldo = option ? option.dataset.saldo : "";

    if (saldo) {
        saldoInfo.innerText = `Saldo disponível com o técnico: ${saldo}`;
        quantidadeInput.max = saldo;
    } else {
        saldoInfo.innerText = "";
        quantidadeInput.removeAttribute("max");
    }
});

const aplicarDesconto = document.getElementById("aplicar_desconto");
const valorDesconto = document.getElementById("valor_desconto");
const alertaDesconto = document.getElementById("alerta_desconto");
const cardAssinatura = document.getElementById("card_assinatura");

aplicarDesconto.addEventListener("change", function () {
    if (this.value === "sim") {
        valorDesconto.disabled = false;
        alertaDesconto.style.display = "block";
        cardAssinatura.style.display = "block";
        ajustarCanvas();
    } else {
        valorDesconto.disabled = true;
        valorDesconto.value = "0";
        alertaDesconto.style.display = "none";
        cardAssinatura.style.display = "none";
        limparAssinatura();
    }
});

const canvas = document.getElementById("assinaturaCanvas");
const ctx = canvas.getContext("2d");
const assinaturaInput = document.getElementById("assinaturaInput");

let desenhando = false;

function ajustarCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}

function getPosicao(e) {
    const rect = canvas.getBoundingClientRect();

    if (e.touches && e.touches.length > 0) {
        return {
            x: e.touches[0].clientX - rect.left,
            y: e.touches[0].clientY - rect.top
        };
    }

    return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
    };
}

function iniciar(e) {
    e.preventDefault();

    desenhando = true;

    const pos = getPosicao(e);

    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
}

function desenhar(e) {
    if (!desenhando) return;

    e.preventDefault();

    const pos = getPosicao(e);

    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();

    assinaturaInput.value = canvas.toDataURL();
}

function parar() {
    desenhando = false;
    assinaturaInput.value = canvas.toDataURL();
}

function limparAssinatura() {
    if (!ctx) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    assinaturaInput.value = "";
}

canvas.addEventListener("mousedown", iniciar);
canvas.addEventListener("mousemove", desenhar);
canvas.addEventListener("mouseup", parar);
canvas.addEventListener("mouseleave", parar);

canvas.addEventListener("touchstart", iniciar);
canvas.addEventListener("touchmove", desenhar);
canvas.addEventListener("touchend", parar);
</script>

{% endblock %}
